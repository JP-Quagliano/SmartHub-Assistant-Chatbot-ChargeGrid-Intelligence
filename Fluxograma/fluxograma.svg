<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 750" width="680" height="750" role="img">
  <title>SmartHub Assistant — fluxograma conversacional</title>
  <desc>Fluxograma vertical do SmartHub Assistant. Caminho de uma mensagem do operador comercial GoodWe da entrada ate a resposta, incluindo decisao de escopo, caminho de recusa padronizada e roadmap para Sprint 2.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t-title { font-family: 'Helvetica', 'Arial', sans-serif; font-size: 14px; font-weight: 500; }
      .t-sub   { font-family: 'Helvetica', 'Arial', sans-serif; font-size: 12px; font-weight: 400; }
      .t-label { font-family: 'Helvetica', 'Arial', sans-serif; font-size: 12px; font-weight: 400; fill: #444441; }
    </style>
  </defs>

  <!-- Fundo branco explicito para funcionar em GitHub dark mode -->
  <rect x="0" y="0" width="680" height="750" fill="#FFFFFF"/>

  <!-- Caixa lateral: Roadmap Sprint 2 -->
  <rect x="480" y="40" width="180" height="140" rx="8" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="492" y="62" class="t-title" fill="#444441">Roadmap sprint 2</text>
  <text x="492" y="90"  class="t-sub" fill="#5F5E5A">→ RAG (ChromaDB)</text>
  <text x="492" y="112" class="t-sub" fill="#5F5E5A">→ Function calling</text>
  <text x="492" y="134" class="t-sub" fill="#5F5E5A">→ Interface Streamlit</text>
  <text x="492" y="156" class="t-sub" fill="#5F5E5A">→ Few-shot examples</text>

  <!-- Inicio (pill cinza) -->
  <rect x="240" y="40" width="120" height="40" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="300" y="65" class="t-title" fill="#444441" text-anchor="middle">Início</text>

  <!-- Entrada do operador (azul) -->
  <rect x="180" y="100" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="300" y="123" class="t-title" fill="#0C447C" text-anchor="middle">Entrada do operador</text>
  <text x="300" y="143" class="t-sub" fill="#185FA5" text-anchor="middle">via interface conversacional</text>

  <!-- Construcao do contexto (roxo) -->
  <rect x="180" y="176" width="240" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="300" y="203" class="t-title" fill="#3C3489" text-anchor="middle">Construção do contexto</text>
  <text x="300" y="225" class="t-sub" fill="#534AB7" text-anchor="middle">system prompt + histórico (N=10)</text>

  <!-- Diamante de decisao (amarelo/ambar) -->
  <polygon points="300,266 410,308 300,350 190,308" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="300" y="312" class="t-title" fill="#854F0B" text-anchor="middle">Dentro do escopo?</text>

  <!-- Recusa elegante (coral) -->
  <rect x="20" y="280" width="140" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="90" y="312" class="t-title" fill="#712B13" text-anchor="middle">Recusa elegante</text>
  <text x="90" y="334" class="t-sub" fill="#993C1D" text-anchor="middle">resposta padronizada</text>

  <!-- Geracao (roxo) -->
  <rect x="180" y="370" width="240" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="300" y="397" class="t-title" fill="#3C3489" text-anchor="middle">Geração com Gemini 2.0</text>
  <text x="300" y="419" class="t-sub" fill="#534AB7" text-anchor="middle">temperature 0.3, 512 tokens</text>

  <!-- Validacao (roxo) -->
  <rect x="180" y="460" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="300" y="483" class="t-title" fill="#3C3489" text-anchor="middle">Validação da resposta</text>
  <text x="300" y="503" class="t-sub" fill="#534AB7" text-anchor="middle">regras de segurança e escopo</text>

  <!-- Entrega (azul) -->
  <rect x="180" y="536" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="300" y="559" class="t-title" fill="#0C447C" text-anchor="middle">Entrega ao operador</text>
  <text x="300" y="579" class="t-sub" fill="#185FA5" text-anchor="middle">+ atualização do histórico</text>

  <!-- Log (cinza) -->
  <rect x="180" y="612" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="300" y="638" class="t-title" fill="#444441" text-anchor="middle">Log operacional</text>

  <!-- Fim (pill cinza) -->
  <rect x="240" y="676" width="120" height="40" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="300" y="701" class="t-title" fill="#444441" text-anchor="middle">Fim</text>

  <!-- Setas verticais (fluxo principal) -->
  <line x1="300" y1="80"  x2="300" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="156" x2="300" y2="176" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="246" x2="300" y2="266" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="350" x2="300" y2="370" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="440" x2="300" y2="460" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="516" x2="300" y2="536" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="592" x2="300" y2="612" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="656" x2="300" y2="676" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Seta horizontal: decisao -> recusa -->
  <line x1="190" y1="308" x2="160" y2="308" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Retorno: recusa -> entrega (L-bend) -->
  <path d="M 90 360 L 90 564 L 180 564" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels Sim/Nao -->
  <text x="308" y="365" class="t-label" text-anchor="start">Sim</text>
  <text x="175" y="300" class="t-label" text-anchor="middle">Não</text>
</svg>
